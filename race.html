<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>실시간 현실 고증 그래픽 엔진</title>
    <style>
        body { margin: 0; padding: 0; background: #111116; font-family: sans-serif; overflow: hidden; display: flex; align-items: flex-start; }
        
        /* 1. 왼쪽 70% 영역: 경기 트랙 가로폭 확장 */
        .canvas-container { position: relative; width: 70%; }
        canvas { display: block; background: #1a1a24; border-radius: 8px; width: 100%; height: 240px; }
        
        /* 2. 오른쪽 25% 영역: 가로폭을 축소하여 더욱 슬림해진 독립 순위창 */
        #live-box {
            width: 25%; margin-left: 2%; background: rgba(26, 26, 36, 0.95);
            padding: 15px; border-radius: 8px; color: #fff; font-size: 12px; height: 210px;
            border: 1px solid #4f46e5; box-shadow: 0 4px 15px rgba(0,0,0,0.5); line-height: 1.8;
            box-sizing: border-box; /* 패딩이 박스 너비를 침범하지 않도록 고정 */
        }
        
        #tooltip {
            position: absolute; background: rgba(20, 20, 30, 0.95); color: #fff;
            padding: 10px; border-radius: 6px; font-size: 11px; display: none;
            pointer-events: none; border: 1px solid #4f46e5; min-width: 170px; line-height: 1.5; z-index: 10;
        }
        
        /* 왼쪽 트랙 영역 가로폭 70% 가이드라인에 맞춰 중심점 비율 보정 */
        .stage-label {
            position: absolute; top: 10px; font-weight: bold; font-size: 11px;
            color: #fff; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 12px;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <!-- 3등분 박스 내부 33.3% 비중의 중심 좌표로 정밀 정렬 -->
        <div class="stage-label" style="left: 16.6%;">🏊‍♂️ 수영 (1.5km)</div>
        <div class="stage-label" style="left: 50%;">🚴‍♂️ 사이클 (40km)</div>
        <div class="stage-label" style="left: 83.3%;">🏃‍♂️ 마라톤 (10km)</div>
        <canvas id="raceCanvas"></canvas>
    </div>

    <!-- 더욱 컴팩트해진 실제 순위판 패널 -->
    <div id="live-box"></div>
    <div id="tooltip"></div>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const liveBox = document.getElementById('live-box');
        const DOT_COUNT = 2000, SPEED_MULTIPLIER = __SPEED_VAL__, VARIANCE_FACTOR = __GAP_VAL__, INTERVAL_SECONDS = __INTERVAL_VAL__;
        let athletes = [], hoveredAthlete = null, frameCount = 0;
        
        function resize() { 
            canvas.width = canvas.parentElement.clientWidth; 
            canvas.height = 240; 
        }
        resize();
        window.addEventListener('resize', resize);
        
        let z1 = canvas.width * 0.333, z2 = canvas.width * 0.666;
        
        for (let i = 1; i <= DOT_COUNT; i++) {
            const skill = 0.4 + Math.random() * VARIANCE_FACTOR;
            athletes.push({
                id: i, name: "#" + i, x: Math.random() * 20 - 30, y: 35 + Math.random() * (canvas.height - 70), radius: 2.2,
                sp1: (0.08 + Math.random() * 0.08) * skill * SPEED_MULTIPLIER,
                sp2: (0.8 + Math.random() * 0.3) * skill * SPEED_MULTIPLIER,
                sp3: (0.25 + Math.random() * 0.15) * skill * SPEED_MULTIPLIER,
                stage: 'ready', color: 'rgba(255,255,255,0.2)', rank: i, startFrame: Math.floor((i - 1) / 10) * (INTERVAL_SECONDS * 60),
                actualStart: null, swimEnd: null, cycleEnd: null, goalEnd: null, raceScore: -999999
            });
        }

        function animate() {
            frameCount += SPEED_MULTIPLIER;
            ctx.fillStyle = '#111116'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            z1 = canvas.width * 0.333; z2 = canvas.width * 0.666;
            
            ctx.fillStyle = 'rgba(56,189,248,0.03)'; ctx.fillRect(0, 0, z1, canvas.height);
            ctx.fillStyle = 'rgba(234,179,8,0.02)'; ctx.fillRect(z1, 0, z2 - z1, canvas.height);
            ctx.fillStyle = 'rgba(239,68,68,0.02)'; ctx.fillRect(z2, 0, canvas.width - z2, canvas.height);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(z1, 0); ctx.lineTo(z1, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(z2, 0); ctx.lineTo(z2, canvas.height); ctx.stroke();
            
            for (let i = 0; i < DOT_COUNT; i++) {
                let p = athletes[i];
                if (p.stage === 'ready' && frameCount >= p.startFrame) { p.stage = 'swim'; p.x = 0; p.actualStart = frameCount; }
                
                if (p.stage === 'swim') {
                    p.x += p.sp1; p.y += Math.sin(frameCount * 0.05 + p.id) * 0.12; p.color = '#38bdf8'; p.curFrame = frameCount - p.actualStart;
                    if (p.x >= z1) { p.stage = 'cycle'; p.swimEnd = frameCount; }
                } else if (p.stage === 'cycle') {
                    p.x += p.sp2; p.color = '#eab308'; p.curFrame = frameCount - p.swimEnd;
                    if (p.x >= z2) { p.stage = 'run'; p.cycleEnd = frameCount; }
                } else if (p.stage === 'run') {
                    p.x += p.sp3; p.color = '#ef4444'; p.curFrame = frameCount - p.cycleEnd;
                    if (p.x >= canvas.width - 15) { p.stage = 'goal'; p.goalEnd = frameCount; p.x = canvas.width - 8; }
                } else if (p.stage === 'goal') { p.color = '#22c55e'; }

                if (p.stage === 'ready') { p.raceScore = -999999 + p.id; }
                else if (p.stage === 'goal') { p.raceScore = 10000000 - (p.goalEnd - p.actualStart); }
                else {
                    let duration = frameCount - p.actualStart; if (duration <= 0) duration = 1;
                    p.raceScore = (p.x / duration) * 100000 + (p.stage === 'run' ? 500000 : p.stage === 'cycle' ? 200000 : 0);
                }
            }

            let sorted = [...athletes].sort((a, b) => b.raceScore - a.raceScore);
            for (let r = 0; r < sorted.length; r++) { athletes[sorted[r].id - 1].rank = r + 1; }
            
            let html = '<b style="color:#a7f3d0; font-size:13px;">🏆 실시간 순위 (넷타임)</b><hr style="border:0; border-top:1px solid #334155; margin:6px 0;">';
            sorted.slice(0, 5).forEach((p, idx) => {
                let icon = p.stage==='swim'?'🏊‍♂️':p.stage==='cycle'?'🚴‍♂️':p.stage==='run'?'🏃‍♂️':p.stage==='goal'?'🏁':'⏱️';
                let net = p.actualStart ? (((p.goalEnd ? p.goalEnd : frameCount) - p.actualStart) / 60).toFixed(2) + "초" : "대기";
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span><b>${idx+1}위</b> 선수 ${p.name} (${net})</span><span>${icon}</span></div>`;
            });
            liveBox.innerHTML = html;

            for (let i = 0; i < DOT_COUNT; i++) {
                let p = athletes[i]; ctx.beginPath();
                if (hoveredAthlete && hoveredAthlete.id === p.id) { ctx.arc(p.x, p.y, p.radius + 2, 0, Math.PI * 2); ctx.fillStyle = '#fff'; }
                else { ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fillStyle = p.color; }
                ctx.fill();
            }

            if (hoveredAthlete) {
                let cur = athletes[hoveredAthlete.id - 1], sTime = "대기", cTime = "대기", mTime = "대기", totalTime = "대기";
                if (cur.actualStart !== null) {
                    let sFrames = (cur.swimEnd ? cur.swimEnd : frameCount) - cur.actualStart; sTime = (sFrames / 60).toFixed(2) + "초" + (cur.swimEnd ? "" : " ⏳");
                    if (cur.swimEnd !== null) { let cFrames = (cur.cycleEnd ? cur.cycleEnd : frameCount) - cur.swimEnd; cTime = (cFrames / 60).toFixed(2) + "초" + (cur.cycleEnd ? "" : " ⏳"); }
                    if (cur.cycleEnd !== null) { let mFrames = (cur.goalEnd ? cur.goalEnd : frameCount) - cur.cycleEnd; mTime = (mFrames / 60).toFixed(2) + "초" + (cur.goalEnd ? "" : " ⏳"); }
                    let totalFrames = (cur.goalEnd ? cur.goalEnd : frameCount) - cur.actualStart; totalTime = (totalFrames / 60).toFixed(2) + "초" + (cur.goalEnd ? " 🏁" : " 🏃‍♂️");
                }
                tooltip.innerHTML = `
                    <strong>선수 ${cur.name} (${cur.stage === 'ready' ? '대기중' : cur.rank + '위'})</strong><br>
                    <hr style="border:0; border-top:1px solid #334155; margin:4px 0;">
                    상태: ${cur.stage==='ready'?'출발대기':cur.stage==='swim'?'수영중':cur.stage==='cycle'?'사이클중':cur.stage==='run'?'마라톤중':'완주!'}<br>
                    <span style="color:#38bdf8;">🏊‍♂️ 수영: ${sTime}</span><br>
                    <span style="color:#eab308;">🚴‍♂️ 사이클: ${cTime}</span><br>
                    <span style="color:#ef4444;">🏃‍♂️ 마라톤: ${mTime}</span><br>
                    <hr style="border:0; border-top:1px dashed #334155; margin:5px 0;">
                    🏁 누적 넷타임: <b>${totalTime}</b>
                `;
            }
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', function(e) {
            const rect = canvas.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
            let found = null;
            for (let i = DOT_COUNT - 1; i >= 0; i--) {
                let p = athletes[i]; if (p.stage === 'ready') continue;
                if (Math.hypot(p.x - mx, p.y - my) < p.radius + 4) { found = p; break; }
            }
            if (found) {
                hoveredAthlete = found; tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px';
            } else { hoveredAthlete = null; tooltip.style.display = 'none'; }
        });

        canvas.addEventListener('mouseleave', function() { hoveredAthlete = null; tooltip.style.display = 'none'; });
        animate();
    </script>
</body>
</html>
